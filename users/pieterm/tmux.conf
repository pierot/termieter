# Resurrect
run-shell ~/.termieter/tmux/tmux-resurrect/resurrect.tmux
set -g @resurrect-strategy-vim "session"
set -g @resurrect-strategy-nvim "session"
set -g @resurrect-capture-pane-contents 'on'
# Default
set -g @resurrect-processes 'tail'

# Continuum: auto-save every 15 min (must load AFTER resurrect).
# Nightly 2am snapshot is handled separately by a launchd agent
# (tmux/be.jackjoe.tmux-resurrect-nightly.plist + resurrect-nightly-save.sh).
run-shell ~/.termieter/tmux/tmux-continuum/continuum.tmux
set -g @continuum-save-interval '15'
# Auto-restore on tmux server start is off by default; uncomment to enable:
# set -g @continuum-restore 'on'

set-window-option -g window-status-current-style bg=maroon

# Make active pane larger height and keep its vertical position.
bind H run-shell 'TMUX_RESIZE_PERCENT=70 sh ~/.termieter/tmux/resize-half-keep.sh #{pane_id}'
